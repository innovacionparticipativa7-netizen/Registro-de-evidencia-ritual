<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ritual Semanal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase COMPAT (sin módulos) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  width:340px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.error{
  color:red;
  font-size:14px;
}

.user-bar{
  position:absolute;
  top:20px;
  right:20px;
}

.hidden{
  display:none;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginCard" class="card">
  <h2>Ritual Semanal</h2>
  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="login()">Iniciar Sesión</button>
  <p id="error" class="error"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">
  <h2>Bienvenido</h2>
  <p id="usuarioInfo"></p>

  <button onclick="logout()" style="background:#ef4444;margin-top:15px;">
    Cerrar Sesión
  </button>
  <button id="btnRegistrar">Registrar Ritual</button>
          <p id="mensaje"></p>
<input type="file" id="foto" accept="image/*">
</div>

<script>

/*  CONFIG FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyB4VtXbaJrPb2Rg9DxRguVvhQXtiCONPc0",
  authDomain: "registro-de-evidencia-ip.firebaseapp.com",
  projectId: "registro-de-evidencia-ip",
  storageBucket: "registro-de-evidencia-ip.firebasestorage.app",
  messagingSenderId: "1036238743155",
  appId: "1:1036238743155:web:9ea3295cf23de0dfa32c06",
  measurementId: "G-966RC1KP2L"
});

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
    .catch(()=>{
      document.getElementById("error").innerText =
        "Correo o contraseña incorrectos";
    });
}

/* LOGOUT */
function logout(){
  auth.signOut();
}

/* REGISTRAR RITUAL */
document.getElementById("btnRegistrar").addEventListener("click", async () => {

  const mensaje = document.getElementById("mensaje");
  mensaje.innerText = "Registrando...";

  try {

    const user = auth.currentUser;

    if (!user) {
      mensaje.innerText = "Usuario no autenticado";
      return;
    }

    // Obtener datos del usuario
    const userDoc = await db.collection("usuarios")
                            .doc(user.uid)
                            .get();

    if (!userDoc.exists) {
      mensaje.innerText = "El usuario no tiene área asignada";
      return;
    }

    const area = userDoc.data().area;
    const nombre = userDoc.data().nombre;

    // Obtener imagen
    const inputFile = document.getElementById("foto");
    const file = inputFile.files[0];

    if (!file) {
      mensaje.innerText = "Selecciona una foto";
      return;
    }

    // Subir a Cloudinary
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "rituales");

    const response = await fetch("https://api.cloudinary.com/v1_1/dc9wxwria/image/upload", {
      method: "POST",
      body: formData
    });

    const data = await response.json();

    if (!data.secure_url) {
      mensaje.innerText = "Error al subir imagen";
      return;
    }

    // Guardar en Firestore
    await db.collection("rituales").add({
      usuario: user.email,
      nombre: nombre,
      area: area,
      imagen: data.secure_url,
      fecha: firebase.firestore.FieldValue.serverTimestamp()
    });

    mensaje.innerText = "✅ Ritual registrado correctamente";
    inputFile.value = "";

  } catch (error) {
    console.error(error);
    mensaje.innerText = "Error al registrar";
  }

});
</script>
</body>
</html>
