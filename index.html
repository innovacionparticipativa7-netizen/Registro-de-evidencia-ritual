<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ritual Semanal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase COMPAT -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.card{
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  width:360px;
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  margin-top:8px;
}
button:hover{ background:#1d4ed8; }
.error{ color:red; font-size:14px; }
.hidden{ display:none; }
.admin-box{
  margin-top:15px;
  padding:10px;
  border:1px solid #ddd;
  border-radius:10px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginCard" class="card">
  <h2>Ritual Semanal</h2>
  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="login()">Iniciar Sesión</button>
  <p id="error" class="error"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">
  <h2>Bienvenido</h2>
  <p id="usuarioInfo"></p>

  <input type="file" id="foto" accept="image/*">
  <button id="btnRegistrar">Registrar Ritual</button>
  <p id="mensaje"></p>

  <!-- PANEL ADMIN -->
  <div id="adminPanel" class="admin-box hidden">
    <h3>📊 Panel Administrador</h3>
    <button onclick="verRituales()">Ver Rituales</button>
    <div id="listaRituales" style="margin-top:10px;"></div>
  </div>

  <button onclick="logout()" style="background:#ef4444;">
    Cerrar Sesión
  </button>
</div>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyB4VtXbaJrPb2Rg9DxRguVvhQXtiCONPc0",
  authDomain: "registro-de-evidencia-ip.firebaseapp.com",
  projectId: "registro-de-evidencia-ip"
});

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
    .catch(error=>{
      document.getElementById("error").innerText = error.message;
    });
}

/* LOGOUT */
function logout(){ auth.signOut(); }

/* CONTROL DE SESIÓN */
auth.onAuthStateChanged(async user => {

  if(user){

    document.getElementById("loginCard").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    const doc = await db.collection("usuarios").doc(user.uid).get();

    if(doc.exists){
      const data = doc.data();

      document.getElementById("usuarioInfo").innerHTML = `
        👤 <strong>${data.nombre}</strong><br>
        🏢 Área: <strong>${data.area}</strong>
      `;

      if(data.rol === "admin"){
        document.getElementById("adminPanel").classList.remove("hidden");
      }

    }

  }else{
    document.getElementById("loginCard").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");
  }

});

/* REGISTRAR RITUAL */
document.getElementById("btnRegistrar").addEventListener("click", async ()=>{

  const mensaje = document.getElementById("mensaje");
  mensaje.innerText = "Registrando...";

  const user = auth.currentUser;
  if(!user){ mensaje.innerText="No autenticado"; return; }

  const userDoc = await db.collection("usuarios").doc(user.uid).get();
  const dataUser = userDoc.data();
  const area = dataUser.area;
  const nombre = dataUser.nombre;

  // 🔒 Restricción por semana por área
  const hoy = new Date();
  const inicioSemana = new Date(hoy.setDate(hoy.getDate()-hoy.getDay()));
  inicioSemana.setHours(0,0,0,0);

  const existente = await db.collection("rituales")
    .where("area","==",area)
    .where("fecha",">=",inicioSemana)
    .get();

  if(!existente.empty){
    mensaje.innerText="⚠️ Esta área ya registró ritual esta semana";
    return;
  }

  const file = document.getElementById("foto").files[0];
  if(!file){ mensaje.innerText="Selecciona una foto"; return; }

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "rituales");

  const response = await fetch("https://api.cloudinary.com/v1_1/dc9wxwria/image/upload",{
    method:"POST",
    body:formData
  });

  const data = await response.json();

  if(!data.secure_url){
    mensaje.innerText="Error al subir imagen";
    return;
  }

  await db.collection("rituales").add({
    usuario:user.email,
    nombre:nombre,
    area:area,
    imagen:data.secure_url,
    fecha:firebase.firestore.FieldValue.serverTimestamp()
  });

  mensaje.innerText="✅ Ritual registrado correctamente";
  document.getElementById("foto").value="";

});

/* PANEL ADMIN */
async function verRituales(){

  const contenedor=document.getElementById("listaRituales");
  contenedor.innerHTML="Cargando...";

  const snapshot=await db.collection("rituales")
                         .orderBy("fecha","desc")
                         .get();

  contenedor.innerHTML="";

  snapshot.forEach(doc=>{
    const data=doc.data();
    contenedor.innerHTML+=`
      <div style="border:1px solid #ddd;padding:8px;margin-bottom:8px;border-radius:8px;">
        <strong>${data.area}</strong><br>
        ${data.nombre}<br>
        <img src="${data.imagen}" width="100%">
      </div>
    `;
  });
}

</script>
</body>
</html>
