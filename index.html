<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Ritual</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:25px;
border-radius:10px;
width:350px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input,select,button{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2>Registro Ritual</h2>

<input type="number" id="numero" placeholder="Número de empleado">

<button onclick="buscarEmpleado()">Buscar</button>

<p id="nombreEmpleado"></p>

<select id="area">
<option value="">Selecciona área</option>
<option>Producción</option>
<option>Calidad</option>
<option>Ingeniería</option>
<option>Logística</option>
</select>

<input type="file" id="foto" accept="image/*">

<button onclick="registrar()">Registrar Ritual</button>

<p id="estado"></p>

</div>

<script>

firebase.initializeApp({
  apiKey: "AIzaSyB4VtXbaJrPb2Rg9DxRguVvhQXtiCONPc0",
  authDomain: "registro-de-evidencia-ip.firebaseapp.com",
  projectId: "registro-de-evidencia-ip",
  storageBucket: "registro-de-evidencia-ip.firebasestorage.app",
  messagingSenderId: "1036238743155",
  appId: "1:1036238743155:web:9ea3295cf23de0dfa32c06",
  measurementId: "G-966RC1KP2L"
});

const db = firebase.firestore();

let nombreGlobal = "";

/* BUSCAR EMPLEADO */

async function buscarEmpleado(){

const numero = document.getElementById("numero").value;

const doc = await db.collection("empleados").doc(numero).get();

if(!doc.exists){

document.getElementById("nombreEmpleado").innerText = "Empleado no encontrado";
return;

}

const data = doc.data();

nombreGlobal = data.nombre;

document.getElementById("nombreEmpleado").innerText =
"Empleado: " + data.nombre;

}

/* REGISTRAR RITUAL */

async function registrar(){

const numero = document.getElementById("numero").value;
const area = document.getElementById("area").value;

if(numero=="" || nombreGlobal=="" || area==""){

alert("Completa los datos");
return;

}

await db.collection("rituales").add({

numero: numero,
nombre: nombreGlobal,
area: area,
fecha: firebase.firestore.FieldValue.serverTimestamp()

});

document.getElementById("estado").innerText =
"✅ Ritual registrado";

}

</script>

</body>
</html>
