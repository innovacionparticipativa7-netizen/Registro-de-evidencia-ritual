<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ritual Semanal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase COMPAT -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}
.card{
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  width:360px;
}
input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  margin-top:8px;
}
button:hover{ background:#1d4ed8; }
.error{ color:red; font-size:14px; }
.hidden{ display:none; }
.admin-box{
  margin-top:15px;
  padding:10px;
  border:1px solid #ddd;
  border-radius:10px;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginCard" class="card">
  <h2>Ritual Semanal</h2>
  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="login()">Iniciar Sesión</button>
  <p id="error" class="error"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">
  <h2>Bienvenido</h2>
  <p id="usuarioInfo"></p>

  <input type="file" id="evidencia" accept="image/*">
<button id="btnRegistrar" onclick="registrarRitual()">Registrar Ritual</button>
<p id="estado"></p>

  <!-- PANEL ADMIN -->
  <div id="adminPanel" class="admin-box hidden">
    <h3>📊 Panel Administrador</h3>
    <button onclick="verRituales()">Ver Rituales</button>
    <div id="listaRituales" style="margin-top:10px;"></div>
  </div>

  <button onclick="logout()" style="background:#ef4444;">
    Cerrar Sesión
  </button>
</div>
<script>

firebase.initializeApp({
  apiKey: "AIzaSyB4VtXbaJrPb2Rg9DxRguVvhQXtiCONPc0",
  authDomain: "registro-de-evidencia-ip.firebaseapp.com",
  projectId: "registro-de-evidencia-ip"
});

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
    .catch(error=>{
      document.getElementById("error").innerText = error.message;
    });
}

/* LOGOUT */
function logout(){
  auth.signOut();
}

/* CONTROL DE SESIÓN */
auth.onAuthStateChanged(async user => {

  if(user){

    document.getElementById("loginCard").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    try{

      const doc = await db.collection("usuarios").doc(user.uid).get();

      if(doc.exists){

        const data = doc.data();

        document.getElementById("usuarioInfo").innerHTML = `
          👤 <strong>${data.nombre}</strong><br>
          🏢 Área: <strong>${data.area}</strong>
        `;

        if(data.rol === "admin"){
          document.getElementById("adminPanel").classList.remove("hidden");
        }

      }

    }catch(error){
      console.log(error);
    }

  }else{

    document.getElementById("loginCard").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");

  }

});

/* REGISTRAR RITUAL */

async function registrarRitual(){

  const fileInput = document.getElementById("evidencia");
  const boton = document.getElementById("btnRegistrar");
  const estado = document.getElementById("estado");

  if(fileInput.files.length === 0){
    alert("Selecciona una imagen");
    return;
  }

  boton.disabled = true;
  estado.innerText = "Validando semana...";

  try{

    const user = auth.currentUser;

    // 🔎 Obtener fecha actual
    const ahora = new Date();

    inicioSemana.setDate(ahora.getDate() - ahora.getDay());
    inicioSemana.setHours(0,0,0,0);

    // 🔎 Buscar si ESTE usuario ya registró esta semana
    const snapshot = await db.collection("rituales")
      .where("usuario","==", user.uid)
      .where("fecha", ">=", inicioSemana)
      .get();

    if(!snapshot.empty){
      estado.innerText = "❌ Ya registraste tu ritual esta semana";
      boton.disabled = false;
      return;
    }

    estado.innerText = "Subiendo imagen...";

    // 📤 Subir a Cloudinary
    const file = fileInput.files[0];
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "rituales");

    const response = await fetch(
      "https://api.cloudinary.com/v1_1/dc9wxwria/image/upload",
      {
        method: "POST",
        body: formData
      }
    );

    const data = await response.json();

    if(!response.ok){
      throw new Error(data.error.message);
    }

    estado.innerText = "Guardando registro...";

    const userDoc = await db.collection("usuarios").doc(user.uid).get();
    const userData = userDoc.data();

    await db.collection("rituales").add({
      usuario: user.uid,
      nombre: userData.nombre,
      area: userData.area,
      imagen: data.secure_url,
      fecha: firebase.firestore.FieldValue.serverTimestamp()
    });

    estado.innerText = "✅ Ritual registrado correctamente";
    boton.disabled = false;
    fileInput.value = "";

  }catch(error){

    console.error(error);
    estado.innerText = "❌ Error real: " + error.message;
    boton.disabled = false;

  }

}
/* PANEL ADMIN */

async function verRituales(){

  const contenedor = document.getElementById("listaRituales");
  contenedor.innerHTML = "Cargando...";

  try{

    const snapshot = await db.collection("rituales")
                             .orderBy("fecha","desc")
                             .get();

    contenedor.innerHTML = "";

    snapshot.forEach(doc=>{
      const data = doc.data();

      contenedor.innerHTML += `
        <div style="border:1px solid #ddd;padding:8px;margin-bottom:8px;border-radius:8px;">
          <strong>${data.area}</strong><br>
          ${data.nombre}<br>
          <img src="${data.imagen}" width="100%">
        </div>
      `;
    });

  }catch(error){
    console.log(error);
    contenedor.innerHTML = "Error al cargar rituales";
  }

}

</script>
</body>
</html>
