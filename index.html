<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Rituales</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

*{
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#facc15,#fbbf24);
margin:0;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
}

/* TARJETAS */

.card{
background:white;
padding:25px;
border-radius:14px;
width:100%;
max-width:420px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
margin-bottom:20px;
}

/* TITULOS */

h2{
text-align:center;
margin-top:0;
color:#1f2937;
}

/* INPUTS */

input, select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:1px solid #d1d5db;
font-size:14px;
transition:.2s;
}

input:focus, select:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 0 2px rgba(37,99,235,0.15);
}

/* INPUT FILE */

input[type="file"]{
background:#f9fafb;
padding:10px;
}

/* BOTON PRINCIPAL */

button{
width:100%;
padding:13px;
margin-top:12px;
border-radius:10px;
border:none;
background:#2563eb;
color:white;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#1d4ed8;
transform:scale(1.02);
}

/* BOTON ADMIN (AZUL DIFERENTE) */

.admin-btn{
background:#1e40af;
}

.admin-btn:hover{
background:#1e3a8a;
}

/* ESTADO */

#estado{
margin-top:10px;
font-weight:bold;
text-align:center;
color:#16a34a;
}

/* IMAGENES */

img{
width:100%;
margin-top:10px;
border-radius:10px;
box-shadow:0 5px 12px rgba(0,0,0,0.15);
}

/* LISTA */

#lista div{
background:#f9fafb;
border-radius:8px;
padding:10px;
margin-top:10px;
}
.contenedor-dashboard{

  gap:20px;
  margin-top:20px;
  width:100%;
}

.columna{

  min-width:300px;
  max-height:500px;
  overflow-y:auto;
  background:#f9fafb;
  padding:10px;
  border-radius:10px;
}
  .contenedor-dashboard{
  display:flex;
  width:100%;
  max-width:1200px;
  margin-top:20px;
  gap:20px;
}

/* columnas */
.columna{
  height:600px;
  overflow-y:auto;
  background:#ffffff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* izquierda (dashboard) */
.izquierda{
  width:35%;
}

/* derecha (rituales) */
.derecha{
  width:65%;
}
  #panelAdmin{
  max-width:1200px !important;
  width:100%;
}
</style>
</head>

<body>

<div class="card">

<h2>Registro Ritual</h2>

<input type="number" id="numero" placeholder="Numero empleado" onkeyup="buscarEmpleado()">


<p id="nombreEmpleado"></p>

<select id="area">
<option value="">Selecciona área</option>
<option>LAVS</option>
<option>ENVIOS A220</option>
<option>GALLEYS & SMALL/MONUMENTOS</option>
<option>SHIP LOOSE</option>
<option>F2F</option>
<option>CASCADAS</option>
<option>MAQUINADO Y TROQUELADO</option>
<option>AIRBUS</option>
<option>BONDEO</option>
<option>COMAC</option>
<option>DECORADO,PINTURA</option>
<option>MANTENIMIENTO</option>
<option>ALMACEN</option>
<option>INSERTOS A220</option>
<option>CNC 3X/5X</option>
<option>LIJADO</option>
<option>LAMINADO / HORNOS</option>
<option>BOEING</option>
<option>MOLDES / PRENSAS</option>
</select>

<input type="file" id="foto" accept="image/*" capture="environment">

<button onclick="registrar()">Registrar Ritual</button>

<p id="estado"></p>

</div>

<button class="admin-btn" onclick="loginAdmin()">Panel Administrador</button>

<div class="card" id="panelAdmin" style="display:none;">

<h2>Panel Administrador</h2>
  
<label>Filtrar por semana:</label>

<input type="number" id="filtroSemana" placeholder="Ejemplo: 12">

<button onclick="verDashboardCompleto()">Ver semana de rituales </button>
<button onclick="exportarExcel()">Exportar rituales</button>

<h3>Subir empleados Excel</h3>

<input type="file" id="excel" accept=".xlsx,.xls">
<button onclick="subirExcel()">Subir empleados</button>
<p id="estadoExcel"></p>
<button onclick="descargarPlantilla()">Descargar plantilla Excel</button>

<div class="contenedor-dashboard">

  <div class="columna">
    <h3>Rituales</h3>
    <div id="lista"></div>
  </div>

  <div class="columna">
    <h3>Semáforo</h3>
    <div id="dashboard"></div>
  </div>

</div>
</div>

<script>

firebase.initializeApp({
apiKey:"AIzaSyB4VtXbaJrPb2Rg9DxRguVvhQXtiCONPc0",
projectId:"registro-de-evidencia-ip"
});

const db=firebase.firestore();

let nombreEmpleado="";

/* BUSCAR EMPLEADO */

async function buscarEmpleado(){

try{

const numero=document.getElementById("numero").value;

if(!numero){
alert("Ingresa número de empleado");
return;
}

const doc=await db.collection("empleados").doc(numero).get();

if(!doc.exists){

document.getElementById("nombreEmpleado").innerText="Empleado no encontrado";
nombreEmpleado="";
return;

}

nombreEmpleado=doc.data().nombre;

document.getElementById("nombreEmpleado").innerText="Empleado: "+nombreEmpleado;

}catch(e){

alert("Error buscando empleado");

}

}
  function loginAdmin(){

const pass = prompt("Ingresa contraseña de administrador");

if(pass === "1234"){

document.getElementById("panelAdmin").style.display="block";

}else{

alert("Contraseña incorrecta");

}

}

/* REGISTRAR RITUAL */

async function registrar(){

try{

const numero=document.getElementById("numero").value;
const area=document.getElementById("area").value;
const foto=document.getElementById("foto").files[0];
const hoy = new Date();
const inicioAno = new Date(hoy.getFullYear(),0,1);
const semana = Math.ceil((((hoy - inicioAno) / 86400000) + inicioAno.getDay()+1)/7);

if(!numero || !area || !foto || nombreEmpleado===""){
alert("Busca empleado, selecciona área y foto");
return;
}

document.getElementById("estado").innerText="Validando semana...";

const ahora=new Date();
const inicioSemana=new Date();

inicioSemana.setDate(ahora.getDate()-ahora.getDay());
inicioSemana.setHours(0,0,0,0);

const existe = await db.collection("rituales")
.where("area","==",area)
.where("semana","==",semana)
.get();

if(!existe.empty){
alert("Esta area ya registró ritual esta semana");
return;
}

document.getElementById("estado").innerText="Subiendo imagen...";

const formData=new FormData();
formData.append("file",foto);
formData.append("upload_preset","rituales");

const response=await fetch(
"https://api.cloudinary.com/v1_1/dc9wxwria/image/upload",
{method:"POST",body:formData}
);

const data=await response.json();

if(!data.secure_url){
alert("Error subiendo imagen");
return;
}

await db.collection("rituales").add({

numero:numero,
nombre:String(nombreEmpleado),
area:area,
imagen:data.secure_url,
semana:semana,
fecha:new Date()

});

document.getElementById("estado").innerText="✅ Ritual registrado";

document.getElementById("foto").value="";
document.getElementById("area").value="";

}catch(e){

console.error(e);
alert("Error registrando ritual");

}

}

/* VER TODOS LOS RITUALES */

async function verRituales(){

const lista=document.getElementById("lista");

lista.innerHTML="Cargando...";

const snapshot=await db.collection("rituales").orderBy("fecha","desc").get();

lista.innerHTML="";

snapshot.forEach(doc=>{

const d=doc.data();

lista.innerHTML+=`

<div style="border:1px solid #ddd;padding:10px;margin-top:10px">

<strong>${d.nombre}</strong><br>
${d.area}<br>

${d.imagen ? `<img src="${d.imagen}">` : ""}

</div>

`;

});

}
  async function verRitualesSemana(){

const lista=document.getElementById("lista");

const semana=document.getElementById("filtroSemana").value;

if(!semana){
alert("Ingresa número de semana");
return;
}

lista.innerHTML="Cargando rituales de semana "+semana+"...";

const snapshot=await db.collection("rituales")
.where("semana","==",Number(semana))
.get();

lista.innerHTML="";

if(snapshot.empty){

lista.innerHTML="No hay rituales en esa semana";

return;

}

snapshot.forEach(doc=>{

const d=doc.data();

lista.innerHTML+=`

<div style="border:1px solid #ddd;padding:10px;margin-top:10px">

<strong>${d.nombre}</strong><br>
Área: ${d.area}<br>
Semana: ${d.semana}<br>

${d.imagen ? `<img src="${d.imagen}">` : ""}

</div>

`;

});

}

/* VER SOLO ESTA SEMANA */

async function verSemana(){

const lista=document.getElementById("lista");

lista.innerHTML="Cargando semana...";

const ahora=new Date();
const inicio=new Date();

inicio.setDate(ahora.getDate()-ahora.getDay());
inicio.setHours(0,0,0,0);

const snapshot=await db.collection("rituales")

${d.nombre} - ${d.area}

</div>

`;

});

}

/* DASHBOARD */

async function dashboardSemaforo(){

const dashboard=document.getElementById("dashboard");

dashboard.innerHTML="Cargando dashboard...";

/* LISTA AREAS */

const areas=[

"LAVS",
"ENVIOS A220",
"GALLEYS & SMALL/MONUMENTOS",
"SHIP LOOSE",
"F2F",
"CASCADAS",
"MAQUINADO Y TROQUELADO",
"AIRBUS",
"BONDEO",
"COMAC",
"DECORADO,PINTURA",
"MANTENIMIENTO",
"ALMACEN",
"INSERTOS A220",
"CNC 3X/5X",
"LIJADO",
"LAMINADO / HORNOS",
"BOEING",
"DUCTOS Y SPARES",
"MOLDES / PRENSAS"

];

/* INICIO SEMANA */

const semanaFiltro = document.getElementById("filtroSemana").value;

let snapshot;

if(semanaFiltro){

snapshot = await db.collection("rituales")
.where("semana","==", Number(semanaFiltro))
.get();

}else{

// si no ponen semana, usa la actual
const hoy = new Date();
const inicioAno = new Date(hoy.getFullYear(),0,1);
const semanaActual = Math.ceil((((hoy - inicioAno) / 86400000) + inicioAno.getDay()+1)/7);

snapshot = await db.collection("rituales")
.where("semana","==", semanaActual)
.get();

}

/* AREAS REGISTRADAS */

let areasRegistradas={};

snapshot.forEach(doc=>{

const area=doc.data().area;

areasRegistradas[area]=true;

});

/* CONTAR */

let registradas=0;

for(const area in areasRegistradas){
registradas++;
}

const total=areas.length;

const porcentaje=Math.round((registradas/total)*100);

/* DASHBOARD */


  dashboard.innerHTML=`
  <h2>Dashboard Ritual Semanal</h2>
<div style="
background:#eee;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
">

<div style="
width:${porcentaje}%;
background:#16a34a;
color:white;
padding:10px;
font-weight:bold;
text-align:center;
">

${porcentaje}% Cumplimiento

</div>

</div>

<p><strong>${registradas}</strong> de <strong>${total}</strong> áreas registraron ritual</p>

`;

/* LISTA AREAS */

areas.forEach(area=>{

const estado=areasRegistradas[area] ? "🟢" : "🔴";

dashboard.innerHTML+=`

<div style="
display:flex;
justify-content:space-between;
padding:10px;
border-bottom:1px solid #ddd;
font-size:18px;
">

<span>${area}</span>
<span style="font-size:24px">${estado}</span>

</div>

`;

});

}

/* EXPORTAR EXCEL */

async function exportarExcel(){

const snapshot=await db.collection("rituales").orderBy("fecha","desc").get();

let datos=[];

snapshot.forEach(doc=>{

const d=doc.data();

let fechaFormateada="";

if(d.fecha){
const fecha=d.fecha.toDate ? d.fecha.toDate() : new Date(d.fecha);

fechaFormateada=fecha.toLocaleDateString()+" "+fecha.toLocaleTimeString();
}

datos.push({
numero:d.numero,
nombre:d.nombre,
area:d.area,
semana:d.semana,
fecha:fechaFormateada,
imagen:d.imagen
});

});

const worksheet=XLSX.utils.json_to_sheet(datos);
const workbook=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(workbook,worksheet,"Rituales");

XLSX.writeFile(workbook,"rituales.xlsx");

}

/* SUBIR EMPLEADOS DESDE EXCEL */

async function subirExcel(){

try{

const estado=document.getElementById("estadoExcel");

const file=document.getElementById("excel").files[0];

if(!file){
alert("Selecciona archivo Excel");
return;
}

estado.innerText="📂 Leyendo archivo Excel...";

const data=await file.arrayBuffer();

const workbook=XLSX.read(data);

const sheet=workbook.Sheets[workbook.SheetNames[0]];

const rows=XLSX.utils.sheet_to_json(sheet);

estado.innerText="⬆ Subiendo empleados...";

let contador=0;

for(const row of rows){

if(!row.numero || !row.nombre) continue;

await db.collection("empleados").doc(String(row.numero)).set({

nombre:String(row.nombre)

});

contador++;

estado.innerText="Subiendo empleados: "+contador+" / "+rows.length;

}

estado.innerText="✅ "+contador+" empleados cargados correctamente";

document.getElementById("excel").value="";

}catch(e){

console.error(e);

document.getElementById("estadoExcel").innerText="❌ Error subiendo Excel";

}

}
function descargarPlantilla(){

const datos = [
{numero:"1001", nombre:"Juan Perez"},
{numero:"1002", nombre:"Ana Lopez"}
];

const worksheet = XLSX.utils.json_to_sheet(datos);

const workbook = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(workbook, worksheet, "Empleados");

XLSX.writeFile(workbook, "plantilla_empleados.xlsx");

}
  function verDashboardCompleto(){
  
  const semana = document.getElementById("filtroSemana").value;

  if(!semana){
    alert("Ingresa número de semana");
    return;
  }

  // Ejecuta ambos
  verRitualesSemana();
  dashboardSemaforo();

}
</script>

</html>
