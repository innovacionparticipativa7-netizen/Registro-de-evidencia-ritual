<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ritual Semanal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase COMPAT (sin módulos) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.card{
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
  width:340px;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.error{
  color:red;
  font-size:14px;
}

.user-bar{
  position:absolute;
  top:20px;
  right:20px;
}

.hidden{
  display:none;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginCard" class="card">
  <h2>Ritual Semanal</h2>
  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="login()">Iniciar Sesión</button>
  <p id="error" class="error"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="card hidden">
  <h2>Bienvenido</h2>
  <p id="usuarioInfo"></p>

  <button onclick="logout()" style="background:#ef4444;margin-top:15px;">
    Cerrar Sesión
  </button>
</div>
  <button id="btnRegistrar">Registrar Ritual</button>
          <p id="mensaje"></p>
<input type="file" id="foto" accept="image/*">

<script>

/*  CONFIG FIREBASE */
firebase.initializeApp({
  apiKey: "AIzaSyB4VtXbaJrPb2Rg9DxRguVvhQXtiCONPc0",
  authDomain: "registro-de-evidencia-ip.firebaseapp.com",
  projectId: "registro-de-evidencia-ip",
  storageBucket: "registro-de-evidencia-ip.firebasestorage.app",
  messagingSenderId: "1036238743155",
  appId: "1:1036238743155:web:9ea3295cf23de0dfa32c06",
  measurementId: "G-966RC1KP2L"
});

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  auth.signInWithEmailAndPassword(email,password)
    .catch(()=>{
      document.getElementById("error").innerText =
        "Correo o contraseña incorrectos";
    });
}

/* LOGOUT */
function logout(){
  auth.signOut();
}

/* CONTROL DE SESIÓN */
auth.onAuthStateChanged(async user=>{
  
  if(user){

    document.getElementById("loginCard").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    try{

      const doc = await db.collection("usuarios")
                          .doc(user.uid)
                          .get();

      if(doc.exists){

        const data = doc.data();

        document.getElementById("usuarioInfo").innerHTML = `
          👤 <strong>${data.nombre}</strong><br>
          🏢 Área: <strong>${data.area}</strong>
        `;
        
      }else{

        document.getElementById("usuarioInfo").innerHTML =
          "Usuario sin área asignada";

      }

    }catch(error){
      console.error(error);
    }

  }else{

    document.getElementById("loginCard").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");

  }

});

  import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, addDoc, collection, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const auth = getAuth();
const db = getFirestore();

document.getElementById("btnRegistrar").addEventListener("click", async () => {

  const mensaje = document.getElementById("mensaje");
  mensaje.textContent = "Registrando...";

  try {

    const user = auth.currentUser;

    if (!user) {
      mensaje.textContent = "Usuario no autenticado";
      return;
    }

    // 🔹 Obtener área vinculada al usuario
    const userDoc = await getDoc(doc(db, "usuarios", user.uid));

    if (!userDoc.exists()) {
      mensaje.textContent = "El usuario no tiene área asignada";
      return;
    }

    const area = userDoc.data().area;

    // 🔹 Subir imagen a Cloudinary
    const inputFile = document.getElementById("foto");
    const file = inputFile.files[0];

    if (!file) {
      mensaje.textContent = "Selecciona una foto";
      return;
    }

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", "TU_UPLOAD_PRESET");

    const response = await fetch("https://api.cloudinary.com/v1_1/TU_CLOUD_NAME/image/upload", {
      method: "POST",
      body: formData
    });

    const data = await response.json();
    const imageUrl = data.secure_url;

    // 🔹 Guardar en Firestore
    await addDoc(collection(db, "rituales"), {
      usuario: user.email,
      area: area,
      imagen: imageUrl,
      fecha: serverTimestamp()
    });

    mensaje.textContent = "✅ Ritual registrado correctamente";
    inputFile.value = "";

  } catch (error) {
    console.error(error);
    mensaje.textContent = "Error al registrar";
  }

});
</script>
</body>
</html>
